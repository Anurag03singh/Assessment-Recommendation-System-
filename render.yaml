services:
  - type: web
    name: shl-assessment-recommender
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements-lite.txt"
    startCommand: "cd backend && python -m uvicorn main_production:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: USE_LITE_MODE
        value: "true"
      - key: SKIP_RERANKING
        value: "false"
      - key: CHROMA_DB_PATH
        value: "./chroma_db"
